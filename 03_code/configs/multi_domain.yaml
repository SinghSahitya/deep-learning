model:
  name: "multi_domain"
  spatial_dim: 256
  freq_dim: 128

training:
  epochs: 30
  batch_size: 4
  lr: 0.0002
  weight_decay: 0.00001
  freeze_backbone_epochs: 3
  grad_clip: 1.0
  scheduler: "cosine"

loss:
  lambda_afs: 0.2
  lambda_freq: 0.1

adversarial:
  method: "pgd"
  epsilon: 0.01568           # 4/255
  pgd_steps: 7
  pgd_alpha: 0.00392         # 1/255
  val_pgd_steps: 7

data:
  root: "../04_data/celeb_df_frames"
  train_csv: "../04_data/celeb_df_frames/train.csv"
  val_csv: "../04_data/celeb_df_frames/val.csv"
  test_csv: "../04_data/celeb_df_frames/test.csv"
  image_size: 224
  clip_length: 16
  num_workers: 8
